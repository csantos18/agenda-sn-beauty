services:
  - type: web
    name: agenda-sn-beauty
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATA_DIR
        value: /var/data
      - key: ADMIN_PIN
        sync: false
      - key: ADMIN_SESSION_SECRET
        sync: false
      - key: BUSINESS_TIME_ZONE
        value: America/Sao_Paulo
      - key: PRODUCTION_ORIGIN
        value: https://agenda-sn-beauty.onrender.com
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: NOTIFICATION_WEBHOOK_URL
        sync: false
    disks:
      - name: agenda-sn-beauty-data
        mountPath: /var/data
        sizeGB: 1
