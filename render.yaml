services:
  - type: web
    name: agenda-sn-beauty
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: ADMIN_PIN
        sync: false
      - key: ADMIN_SESSION_SECRET
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: NOTIFICATION_WEBHOOK_URL
        sync: false
